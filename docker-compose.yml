services:
  migrate:
    build:
      context: .
      dockerfile: Dockerfile.migrate
    container_name: phone-number-migrate
    volumes:
      - ./db/migrations:/migrations
    command: 
      - postgres
      - "postgres://${POSTGRES_USER:-phoneuser}:${POSTGRES_PASSWORD:-phonepass}@postgres:5432/${POSTGRES_DB:-phonenumbers}?sslmode=disable"
      - up
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: phone-number-api
    restart: unless-stopped
    ports:
      - "${API_PORT:-8080}:8080"
    environment:
      PORT: "8080"
      DATABASE_URL: postgres://${POSTGRES_USER:-phoneuser}:${POSTGRES_PASSWORD:-phonepass}@postgres:5432/${POSTGRES_DB:-phonenumbers}?sslmode=disable
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: phone-number-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-phoneuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-phonepass}
      POSTGRES_DB: ${POSTGRES_DB:-phonenumbers}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - phone_number_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  phone_number_pgdata:
